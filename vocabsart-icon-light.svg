<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Soft pastel background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#EEF3FF"/>
    </linearGradient>

    <!-- Paintbrush stroke gradient -->
    <linearGradient id="brushGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C61"/>
      <stop offset="50%" style="stop-color:#FFCA3A"/>
      <stop offset="100%" style="stop-color:#D45DE8"/>
    </linearGradient>

    <!-- Letter gradient: rich indigo to violet -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3A3D9E"/>
      <stop offset="100%" style="stop-color:#6C3FC7"/>
    </linearGradient>

    <!-- Gold "A" gradient -->
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C61"/>
      <stop offset="100%" style="stop-color:#E84393"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for letter -->
    <filter id="letterShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6C3FC7" flood-opacity="0.18"/>
    </filter>

    <!-- Brush shadow -->
    <filter id="brushShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#FF8C61" flood-opacity="0.25"/>
    </filter>

    <clipPath id="roundClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Soft inner glow ring -->
  <rect width="512" height="512" rx="112" ry="112"
        fill="none" stroke="#D8C8FF" stroke-width="2" opacity="0.5"/>

  <!-- Soft decorative circles in background -->
  <circle cx="60" cy="80" r="80" fill="#FFE8D6" opacity="0.4"/>
  <circle cx="460" cy="440" r="100" fill="#E0D4FF" opacity="0.35"/>
  <circle cx="430" cy="90" r="55" fill="#FFDDF4" opacity="0.3"/>

  <!-- Subtle dot grid -->
  <g clip-path="url(#roundClip)" opacity="0.06">
    <circle cx="80" cy="80" r="2" fill="#5B4FCF"/>
    <circle cx="160" cy="80" r="2" fill="#5B4FCF"/>
    <circle cx="240" cy="80" r="2" fill="#5B4FCF"/>
    <circle cx="320" cy="80" r="2" fill="#5B4FCF"/>
    <circle cx="400" cy="80" r="2" fill="#5B4FCF"/>
    <circle cx="80" cy="160" r="2" fill="#5B4FCF"/>
    <circle cx="160" cy="160" r="2" fill="#5B4FCF"/>
    <circle cx="240" cy="160" r="2" fill="#5B4FCF"/>
    <circle cx="320" cy="160" r="2" fill="#5B4FCF"/>
    <circle cx="400" cy="160" r="2" fill="#5B4FCF"/>
    <circle cx="80" cy="240" r="2" fill="#5B4FCF"/>
    <circle cx="160" cy="240" r="2" fill="#5B4FCF"/>
    <circle cx="320" cy="240" r="2" fill="#5B4FCF"/>
    <circle cx="400" cy="240" r="2" fill="#5B4FCF"/>
    <circle cx="80" cy="320" r="2" fill="#5B4FCF"/>
    <circle cx="160" cy="320" r="2" fill="#5B4FCF"/>
    <circle cx="320" cy="320" r="2" fill="#5B4FCF"/>
    <circle cx="400" cy="320" r="2" fill="#5B4FCF"/>
    <circle cx="80" cy="400" r="2" fill="#5B4FCF"/>
    <circle cx="160" cy="400" r="2" fill="#5B4FCF"/>
    <circle cx="240" cy="400" r="2" fill="#5B4FCF"/>
    <circle cx="320" cy="400" r="2" fill="#5B4FCF"/>
    <circle cx="400" cy="400" r="2" fill="#5B4FCF"/>
  </g>

  <!-- Paintbrush swoosh -->
  <path d="M 90 360 Q 180 150 340 200 Q 430 230 420 310"
        fill="none"
        stroke="url(#brushGrad)"
        stroke-width="18"
        stroke-linecap="round"
        opacity="0.75"
        filter="url(#brushShadow)"/>

  <!-- Brush tip -->
  <ellipse cx="420" cy="310" rx="10" ry="18" fill="#FFCA3A" opacity="0.9"
           transform="rotate(-30 420 310)" filter="url(#glow)"/>

  <!-- Ink splatter dots -->
  <circle cx="108" cy="345" r="5" fill="#FF8C61" opacity="0.5"/>
  <circle cx="88" cy="372" r="3" fill="#FFCA3A" opacity="0.5"/>
  <circle cx="125" cy="370" r="4" fill="#D45DE8" opacity="0.35"/>
  <circle cx="400" cy="285" r="4" fill="#FF8C61" opacity="0.4"/>
  <circle cx="440" cy="330" r="3" fill="#FFCA3A" opacity="0.35"/>

  <!-- Faint floating letters -->
  <text x="68" y="170" font-family="Georgia, serif" font-size="28" fill="#6C3FC7" opacity="0.07" transform="rotate(-15 68 170)">a</text>
  <text x="390" y="140" font-family="Georgia, serif" font-size="22" fill="#6C3FC7" opacity="0.07" transform="rotate(12 390 140)">z</text>
  <text x="420" y="400" font-family="Georgia, serif" font-size="24" fill="#6C3FC7" opacity="0.06" transform="rotate(-8 420 400)">w</text>
  <text x="70" y="420" font-family="Georgia, serif" font-size="20" fill="#6C3FC7" opacity="0.06" transform="rotate(10 70 420)">e</text>
  <text x="310" y="430" font-family="Georgia, serif" font-size="18" fill="#6C3FC7" opacity="0.06" transform="rotate(-5 310 430)">q</text>

  <!-- Central "V" -->
  <text x="256" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="240"
        font-weight="bold"
        text-anchor="middle"
        fill="url(#letterGrad)"
        filter="url(#letterShadow)"
        opacity="0.95">V</text>

  <!-- "A" accent -->
  <text x="356" y="355"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="80"
        font-weight="bold"
        text-anchor="middle"
        fill="url(#aGrad)"
        opacity="0.9"
        filter="url(#glow)">A</text>

  <!-- Bottom wordmark -->
  <text x="256" y="462"
        font-family="'Palatino Linotype', Palatino, serif"
        font-size="34"
        letter-spacing="10"
        text-anchor="middle"
        fill="#5B4FCF"
        opacity="0.45">VOCABSART</text>

  <!-- Thin accent underline -->
  <line x1="148" y1="472" x2="364" y2="472" stroke="#FF8C61" stroke-width="1.5" opacity="0.35"/>
</svg>
