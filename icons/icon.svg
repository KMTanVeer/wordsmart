<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep ink blue to rich violet -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B3E"/>
      <stop offset="100%" style="stop-color:#2A0845"/>
    </linearGradient>

    <!-- Paintbrush stroke gradient -->
    <linearGradient id="brushGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF3CAC"/>
    </linearGradient>

    <!-- Letter glow -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#A8EDEA"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#FF6B35" flood-opacity="0.35"/>
    </filter>

    <!-- Rounded square clip -->
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture lines -->
  <g clip-path="url(#roundClip)" opacity="0.04">
    <line x1="0" y1="64" x2="512" y2="64" stroke="white" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="192" x2="512" y2="192" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="512" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="0" y1="448" x2="512" y2="448" stroke="white" stroke-width="1"/>
    <line x1="64" y1="0" x2="64" y2="512" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="192" y1="0" x2="192" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
    <line x1="448" y1="0" x2="448" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Paintbrush swoosh — the artistic stroke behind the letter -->
  <path d="M 90 360 Q 180 150 340 200 Q 430 230 420 310"
        fill="none"
        stroke="url(#brushGrad)"
        stroke-width="22"
        stroke-linecap="round"
        opacity="0.85"
        filter="url(#glow)"/>

  <!-- Paintbrush tip detail -->
  <ellipse cx="420" cy="310" rx="12" ry="22" fill="#FFD700" opacity="0.9" transform="rotate(-30 420 310)" filter="url(#glow)"/>

  <!-- Ink splatter dots -->
  <circle cx="108" cy="345" r="5" fill="#FF6B35" opacity="0.7"/>
  <circle cx="88" cy="372" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="125" cy="370" r="4" fill="#FF3CAC" opacity="0.5"/>
  <circle cx="400" cy="285" r="4" fill="#FF6B35" opacity="0.5"/>
  <circle cx="440" cy="330" r="3" fill="#FFD700" opacity="0.4"/>

  <!-- Floating small letters in background (decorative) -->
  <text x="68" y="170" font-family="Georgia, serif" font-size="28" fill="white" opacity="0.08" transform="rotate(-15 68 170)">a</text>
  <text x="390" y="140" font-family="Georgia, serif" font-size="22" fill="white" opacity="0.08" transform="rotate(12 390 140)">z</text>
  <text x="420" y="400" font-family="Georgia, serif" font-size="24" fill="white" opacity="0.07" transform="rotate(-8 420 400)">w</text>
  <text x="70" y="420" font-family="Georgia, serif" font-size="20" fill="white" opacity="0.07" transform="rotate(10 70 420)">e</text>
  <text x="310" y="430" font-family="Georgia, serif" font-size="18" fill="white" opacity="0.07" transform="rotate(-5 310 430)">q</text>

  <!-- Central bold "V" letter -->
  <text x="256" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="240"
        font-weight="bold"
        text-anchor="middle"
        fill="url(#letterGrad)"
        filter="url(#softShadow)"
        opacity="0.97">V</text>

  <!-- "A" subscript to hint at "Art" -->
  <text x="356" y="355"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="80"
        font-weight="bold"
        text-anchor="middle"
        fill="#FFD700"
        opacity="0.9"
        filter="url(#glow)">A</text>

  <!-- Bottom label -->
  <text x="256" y="462"
        font-family="'Palatino Linotype', Palatino, serif"
        font-size="34"
        letter-spacing="10"
        text-anchor="middle"
        fill="white"
        opacity="0.55">VOCABSART</text>

  <!-- Thin golden underline accent -->
  <line x1="148" y1="472" x2="364" y2="472" stroke="#FFD700" stroke-width="1.5" opacity="0.4"/>
</svg>
