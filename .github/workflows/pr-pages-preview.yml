name: PR Pages Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy PR preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare preview directory
        run: |
          PR_DIR="preview/pr-${{ github.event.pull_request.number }}"
          mkdir -p "$PR_DIR"

          cp index.html manifest.json service-worker.js "$PR_DIR"/

          [ -f avatar.jpg ] && cp avatar.jpg "$PR_DIR"/
          [ -f vocabsart-icon.svg ] && cp vocabsart-icon.svg "$PR_DIR"/
          [ -f vocabsart-icon-light.svg ] && cp vocabsart-icon-light.svg "$PR_DIR"/
          [ -d icons ] && cp -r icons "$PR_DIR"/
          [ -d fonts ] && cp -r fonts "$PR_DIR"/

          touch preview/.nojekyll

      - name: Deploy preview to gh-pages-previews branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages-previews
          publish_dir: ./preview
          keep_files: true
          enable_jekyll: false

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/
        with:
          script: |
            const marker = '<!-- pr-pages-preview-url -->';
            const body = `${marker}
            ✅ Preview deployed: ${process.env.PREVIEW_URL}

            This preview is isolated for PR #${context.payload.pull_request.number}.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find(
              c => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  cleanup-preview:
    name: Cleanup PR preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Check preview branch existence
        id: branch_check
        run: |
          if git ls-remote --exit-code --heads "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages-previews >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout preview branch
        if: steps.branch_check.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages-previews
          fetch-depth: 0

      - name: Remove PR preview directory
        if: steps.branch_check.outputs.exists == 'true'
        run: |
          rm -rf "pr-${{ github.event.pull_request.number }}"
          touch .nojekyll

          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
            git push origin gh-pages-previews
          fi

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-pages-preview-url -->';
            const body = `${marker}
            ℹ️ Preview removed because this PR was closed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find(
              c => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            }
