name: Build Android APK

on:
  workflow_dispatch:          # Run manually from GitHub Actions tab
  push:
    branches: [ main, master ]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'service-worker.js'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java (required by Gradle / Android build tools) ───────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Node.js (required by Capacitor CLI) ────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 4. Android SDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Download Google Fonts for offline use in APK ───────────────────
      - name: Download Google Fonts
        run: |
          mkdir -p fonts

          # Fetch the full CSS from Google Fonts (Android UA gets WOFF2)
          curl -sA "Mozilla/5.0 (Linux; Android 14; Pixel 8) AppleWebKit/537.36 \
            (KHTML, like Gecko) Chrome/125.0.0.0 Mobile Safari/537.36" \
            "https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700\
          &family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" \
            -o /tmp/gfonts.css

          # Extract all woff2 URLs and download them
          grep -oP "(?<=url\()https://[^)]+\.woff2" /tmp/gfonts.css | sort -u > /tmp/font_urls.txt
          echo "Font URLs found:" && cat /tmp/font_urls.txt

          while IFS= read -r url; do
            filename=$(echo "$url" | md5sum | cut -d' ' -f1).woff2
            curl -sL "$url" -o "fonts/$filename" && echo "Downloaded $filename"
          done < /tmp/font_urls.txt

          # Build a local fonts.css with @font-face blocks pointing to local files
          python3 - <<'PYEOF'
          import re, hashlib, os

          with open('/tmp/gfonts.css') as f:
              css = f.read()

          def replace_url(m):
              url = m.group(1)
              h = hashlib.md5(url.encode()).hexdigest()
              return f"url(../fonts/{h}.woff2)"

          css = re.sub(r"url\((https://[^)]+\.woff2)\)", replace_url, css)
          os.makedirs('fonts', exist_ok=True)
          with open('fonts/fonts.css', 'w') as f:
              f.write(css)
          print("fonts/fonts.css written")
          PYEOF

      # ── 6. Patch index.html to use local fonts ────────────────────────────
      - name: Patch index.html — use local fonts
        run: |
          python3 - <<'PYEOF'
          import re

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          # Remove Google Fonts preconnect and stylesheet links
          html = re.sub(r'<link[^>]+fonts\.googleapis\.com[^>]*>\n?', '', html)
          html = re.sub(r'<link[^>]+fonts\.gstatic\.com[^>]*>\n?', '', html)

          # Insert local fonts.css link before </head> (or before <style>)
          local_link = '<link rel="stylesheet" href="fonts/fonts.css">\n'
          if '<style>' in html:
              html = html.replace('<style>', local_link + '<style>', 1)
          else:
              html = html.replace('</head>', local_link + '</head>', 1)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print("index.html patched — local fonts applied")
          PYEOF

      # ── 7. Generate app icons ─────────────────────────────────────────────
      - name: Generate PNG icons from SVG
        run: |
          # Install rsvg-convert (part of librsvg2-bin)
          sudo apt-get install -y librsvg2-bin 2>/dev/null || true
          mkdir -p icons

          for size in 72 96 128 144 152 192 384 512; do
            if command -v rsvg-convert &>/dev/null; then
              rsvg-convert -w $size -h $size icons/icon.svg -o icons/icon-${size}.png
            else
              # Fallback: use ImageMagick
              convert -background none icons/icon.svg -resize ${size}x${size} icons/icon-${size}.png 2>/dev/null || \
              # Last fallback: create a minimal solid PNG with Python
              python3 -c "
          import struct, zlib, base64
          def create_png(size, color=(17,19,24)):
              w = h = size
              raw = b''.join(b'\x00' + bytes(color) * w for _ in range(h))
              def chunk(t,d): c=zlib.crc32(t+d)&0xffffffff; return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              ihdr=struct.pack('>IIBBBBB',w,h,8,2,0,0,0)
              idat=zlib.compress(raw)
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',ihdr)+chunk(b'IDAT',idat)+chunk(b'IEND',b'')
          with open('icons/icon-${size}.png','wb') as f: f.write(create_png(${size}))
          "
            fi
          done
          echo "Icons generated:" && ls -la icons/*.png

      # ── 8. Assemble web assets into www/ (Capacitor webDir) ──────────────
      - name: Prepare www directory
        run: |
          mkdir -p www
          cp index.html manifest.json service-worker.js avatar.jpg www/
          cp -r fonts www/
          cp -r icons www/

      # ── 9. Install Capacitor dependencies ────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 10. Add Android platform & sync web assets ────────────────────────
      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync web assets to Android project
        run: npx cap sync android

      # ── 10. Accept Android SDK licenses ───────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      # ── 11. Build debug APK ───────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 12. Upload APK as artifact ────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LexIBA-WordSmart-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Create release (on push to main/master) ───────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "LexIBA APK — Build ${{ github.run_number }}"
          body: |
            ## LexIBA WordSmart Android APK

            ### Install instructions
            1. Download `app-debug.apk` from the **Assets** section below
            2. On your Android phone, go to **Settings → Security** and enable **Install from unknown sources**
            3. Open the downloaded APK file and tap **Install**
            4. Open **LexIBA** from your app drawer

            ### Features
            - ✅ Full offline support — no internet required
            - ✅ All vocabulary, quizzes, and progress saved locally
            - ✅ Same experience as the website
          files: android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
